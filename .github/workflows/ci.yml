name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install nightly Rust for threaded WASM
        run: rustup toolchain install nightly-2024-08-02 --component rust-src --target wasm32-unknown-unknown

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Check diagrams
        run: node scripts/check-diagrams.mjs

      - name: Check WASM target
        run: cargo check --locked --target wasm32-unknown-unknown

      - name: Check threaded WASM target
        run: RUSTFLAGS="-C target-feature=+atomics,+bulk-memory" RUSTUP_TOOLCHAIN=nightly-2024-08-02 cargo check --locked --target wasm32-unknown-unknown --features wasm-bindgen-rayon -Z build-std=panic_abort,std

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Check Cloudflare Pages bundle
        run: ./scripts/build-pages.sh

  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: rust
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' ||
         github.ref == 'refs/heads/feature/parallel-evolution-refactor'))
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install nightly Rust for threaded WASM
        run: rustup toolchain install nightly-2024-08-02 --component rust-src --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Build Cloudflare Pages bundle
        run: ./scripts/build-pages.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=evo-1 --branch=main
