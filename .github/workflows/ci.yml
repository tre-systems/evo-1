name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install nightly Rust for threaded WASM
        run: rustup toolchain install nightly-2024-08-02 --component rust-src --target wasm32-unknown-unknown

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Check diagrams
        run: node scripts/check-diagrams.mjs

      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown

      - name: Check threaded WASM target
        run: RUSTUP_TOOLCHAIN=nightly-2024-08-02 cargo check --target wasm32-unknown-unknown --features wasm-bindgen-rayon -Z build-std=panic_abort,std
