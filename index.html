<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleO - Evolutionary Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            background: #16213e;
            color: #ffffff;
            border: 2px solid #00d4ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .canvas-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        #canvas {
            border: 2px solid #00d4ff;
            border-radius: 5px;
            background: #0f3460;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #16213e;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #00d4ff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .status {
            background: #16213e;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #00d4ff;
            margin-bottom: 20px;
        }
        
        .error {
            background: #4a1a1a;
            border-color: #ff4444;
            color: #ff8888;
        }
        
        .success {
            background: #1a4a1a;
            border-color: #44ff44;
            color: #88ff88;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BattleO - Evolutionary Simulation</h1>
        
        <div id="status" class="status">
            <div class="loading">Loading BattleO simulation...</div>
        </div>
        
        <div class="controls">
            <button id="startBtn" disabled>Start Simulation</button>
            <button id="stopBtn" disabled>Stop Simulation</button>
            <button id="resetBtn" disabled>Reset</button>
            <button id="addAgentBtn" disabled>Add Agent</button>
            <button id="addResourceBtn" disabled>Add Resource</button>
            <button id="initParallelBtn" disabled>Initialize Parallel Processing</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="canvas" width="1000" height="800"></canvas>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Agents</div>
                <div class="stat-value" id="agentCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Resources</div>
                <div class="stat-value" id="resourceCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Energy</div>
                <div class="stat-value" id="totalEnergy">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average Age</div>
                <div class="stat-value" id="avgAge">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Max Generation</div>
                <div class="stat-value" id="maxGen">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">FPS</div>
                <div class="stat-value" id="fps">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { BattleSimulation, ParallelProcessor } from './pkg/battleo.js';

        let simulation = null;
        let processor = null;
        let animationId = null;
        let isRunning = false;
        let frameCount = 0;
        let lastTime = performance.now();

        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const addAgentBtn = document.getElementById('addAgentBtn');
        const addResourceBtn = document.getElementById('addResourceBtn');
        const initParallelBtn = document.getElementById('initParallelBtn');

        function updateStatus(message, type = 'info') {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        function updateStats(stats) {
            document.getElementById('agentCount').textContent = stats.agent_count;
            document.getElementById('resourceCount').textContent = stats.resource_count;
            document.getElementById('totalEnergy').textContent = Math.round(stats.total_energy);
            document.getElementById('avgAge').textContent = Math.round(stats.average_age);
            document.getElementById('maxGen').textContent = stats.max_generation;
        }

        function updateFPS() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastTime;
            
            if (deltaTime >= 1000) {
                const fps = Math.round((frameCount * 1000) / deltaTime);
                document.getElementById('fps').textContent = fps;
                frameCount = 0;
                lastTime = currentTime;
            }
            frameCount++;
        }

        function animate() {
            if (!isRunning) return;
            
            simulation.update();
            updateStats(simulation.getStats());
            updateFPS();
            
            animationId = requestAnimationFrame(animate);
        }

        function startSimulation() {
            if (!simulation) return;
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            animate();
            updateStatus('Simulation running...', 'success');
        }

        function stopSimulation() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            updateStatus('Simulation stopped', 'info');
        }

        function resetSimulation() {
            if (!simulation) return;
            
            stopSimulation();
            simulation.reset();
            updateStats(simulation.getStats());
            updateStatus('Simulation reset', 'info');
        }

        function addAgent() {
            if (!simulation) return;
            
            const x = Math.random() * 1000;
            const y = Math.random() * 800;
            simulation.addAgent(x, y);
            updateStats(simulation.getStats());
        }

        function addResource() {
            if (!simulation) return;
            
            const x = Math.random() * 1000;
            const y = Math.random() * 800;
            simulation.addResource(x, y);
            updateStats(simulation.getStats());
        }

        async function initializeParallelProcessing() {
            if (!processor) return;
            
            try {
                updateStatus('Initializing parallel processing...', 'info');
                await processor.initialize();
                
                if (processor.isRayonAvailable()) {
                    updateStatus('Parallel processing enabled! Using Web Workers for true threading.', 'success');
                } else {
                    updateStatus('Parallel processing not available. Using sequential processing.', 'error');
                }
            } catch (error) {
                updateStatus(`Failed to initialize parallel processing: ${error}`, 'error');
            }
        }

        // Event listeners
        startBtn.addEventListener('click', startSimulation);
        stopBtn.addEventListener('click', stopSimulation);
        resetBtn.addEventListener('click', resetSimulation);
        addAgentBtn.addEventListener('click', addAgent);
        addResourceBtn.addEventListener('click', addResource);
        initParallelBtn.addEventListener('click', initializeParallelProcessing);

        // Initialize the application
        async function main() {
            try {
                updateStatus('Loading WebAssembly module...', 'info');
                await init();
                
                updateStatus('Creating parallel processor...', 'info');
                processor = new ParallelProcessor();
                initParallelBtn.disabled = false;
                
                updateStatus('Creating simulation...', 'info');
                simulation = new BattleSimulation('canvas');
                
                // Add initial population
                for (let i = 0; i < 100; i++) {
                    simulation.addAgent(Math.random() * 1000, Math.random() * 800);
                }
                
                for (let i = 0; i < 200; i++) {
                    simulation.addResource(Math.random() * 1000, Math.random() * 800);
                }
                
                updateStats(simulation.getStats());
                
                // Enable controls
                startBtn.disabled = false;
                resetBtn.disabled = false;
                addAgentBtn.disabled = false;
                addResourceBtn.disabled = false;
                
                updateStatus('BattleO simulation ready! Click "Initialize Parallel Processing" for best performance, then "Start Simulation".', 'success');
                
            } catch (error) {
                updateStatus(`Failed to initialize BattleO: ${error}`, 'error');
                console.error('Initialization error:', error);
            }
        }

        // Start the application
        main();
    </script>
</body>
</html>
